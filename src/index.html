<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DAICO Zarya</title>
    <style>
      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
    <script>
      if (window.location.search.includes('print-pdf')) {
        document.documentElement.style.cssText += 'height:auto!important;overflow:visible!important;';
        document.addEventListener('DOMContentLoaded', function () {
          document.body.style.cssText += 'height:auto!important;overflow:visible!important;';
          var root = document.getElementById('root');
          if (root) root.style.cssText += 'height:auto!important;overflow:visible!important;';
        });
      }
    </script>
    <link id="theme" rel="stylesheet" href="https://unpkg.com/reveal.js@6.0.1/dist/theme/beige.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./frontend.tsx"></script>
  </body>
</html>
